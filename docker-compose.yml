version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: samha-crm-db
    environment:
      POSTGRES_USER: samha_user
      POSTGRES_PASSWORD: samha_password
      POSTGRES_DB: samha_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samha_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
